specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Community Health Systems
providerId: community-health-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Hospital
description: Community Health Systems (CHS) is a hospital operator. There is no public API or developer
  pricing — patient data is exposed through CMS-mandated patient-access and provider-directory endpoints
  on hospital websites, but those are regulatory (free) endpoints, not commercial APIs.
sources:
  - https://www.chs.net/
notes: No commercial API or developer plan. Any FHIR/patient-access endpoints required by CMS interoperability
  rules are provided at no charge to patients.
plans:
  - id: community-health-systems-regulatory
    name: Regulatory FHIR / Patient Access
    type: freemium
    description: CMS-mandated patient-access and provider-directory FHIR endpoints, when available at
      affiliated hospitals, are free for patients to access.
    entries:
      - label: Patient access (FHIR)
        name: patient_access
        type: quota
        metric: request
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: CMS Patient Access API (where applicable)
      - name: Provider Directory API (where applicable)
maintainers:
