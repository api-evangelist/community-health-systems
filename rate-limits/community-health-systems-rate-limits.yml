specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Community Health Systems
providerId: community-health-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Healthcare
  - FHIR
description: Community Health Systems does not publish a public API rate-limit reference. CMS-mandated
  patient-access endpoints, where present at affiliated hospitals, follow vendor (typically EHR) defaults
  rather than a CHS-issued public spec.
sources:
  - https://www.chs.net/
notes: No public rate-limit spec; effective limits set by underlying EHR vendor.
responseCodes:
  throttled: 429
limits:
  - name: Patient access FHIR (vendor-defined)
    scope: account
    metric: varies
    limit: see EHR vendor documentation
policies:
  - name: Backoff
    description: Use exponential backoff with jitter on 429/503 if rate-limited.
  - name: Vendor-governed
    description: Rate limits are governed by the EHR vendor providing the patient-access endpoint, not
      by CHS directly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
