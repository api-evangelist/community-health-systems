specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Community Health Systems
providerId: community-health-systems
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Healthcare
description: 'FOCUS-aligned FinOps for Community Health Systems: a hospital operator without a commercial
  API surface. CHS pays vendors (EHR, RCM, payers) rather than billing API consumers. Meters here capture
  vendor invoice abstractions, not consumption-metered API revenue.'
sources:
  - https://www.chs.net/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Community Health Systems, Inc.
serviceCategory: Healthcare
billingModel:
  pricingCategory: Healthcare Services
  billingFrequency: Per-Encounter
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Community Health Systems
  ServiceCategory: Healthcare
  ProviderName: Community Health Systems
  PublisherName: Community Health Systems, Inc.
  InvoiceIssuerName: Community Health Systems, Inc.
  BillingCurrency: USD
meters:
  - name: patient_encounters
    unit: encounter
    aggregation: sum
    dimensions:
      - facility
      - service_line
  - name: ehr_subscription
    unit: month
    aggregation: sum
  - name: rcm_services
    unit: claim
    aggregation: sum
principles:
  - name: Visibility
    description: Track EHR vendor consumption (storage, transactions) against contract; reconcile vendor
      invoices monthly.
  - name: Allocation
    description: Tag IT spend to facility, service line, or revenue cycle function.
  - name: Optimization
    description: Consolidate vendor contracts across acquisitions; renegotiate at renewal.
  - name: Accountability
    description: CIO/CFO own enterprise vendor relationships; facility CFOs own local IT chargeback.
notes: CHS is not an API publisher; meters here are invoice abstractions for the operator's IT spend.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
